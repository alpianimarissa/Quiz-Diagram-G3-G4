<!DOCTYPE html>
<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ujian Misi Data Angkasa — 20 Soal Statistika SD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root {
  --bg: #eef2ff;
  --navy: #141a4d;
  --navy2: #1d2566;
  --indigo: #2f3c9e;
  --cyan: #2fd3e8;
  --cyan-dark: #12a3b8;
  --amber: #ffb627;
  --amber-dark: #e0930a;
  --coral: #ff6b5b;
  --coral-dark: #e14636;
  --mint: #22c58b;
  --mint-dark: #149467;
  --violet: #8b6bff;
  --violet-dark: #6b46e8;
  --card: #ffffff;
  --ink: #181c3a;
  --ink-soft: #565b8a;
  --radius-lg: 26px;
  --radius-md: 18px;
  --radius-sm: 12px;
  --shadow-soft: 0 10px 30px rgba(20,26,77,0.12);
  --shadow-pop: 0 14px 34px rgba(20,26,77,0.20);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,0.10) 0, transparent 3%),
    radial-gradient(circle at 85% 20%, rgba(255,255,255,0.08) 0, transparent 3%),
    radial-gradient(ellipse at 50% -10%, #2a3380 0%, #141a4d 45%, #0b0f30 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-x: hidden;
}
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 3.4s ease-in-out infinite;
}
@keyframes twinkle { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }

#device {
  position: relative; z-index: 1;
  width: 100%; max-width: 860px;
  background: linear-gradient(180deg, #1a2065, #12173f);
  border-radius: 34px;
  padding: 14px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.06);
}
#screen {
  background: var(--bg);
  border-radius: 24px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: min(780px, 86vh);
  max-height: min(780px, 86vh);
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.08);
}

#topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: linear-gradient(180deg, #1d2566, #171d54);
  color: #fff;
  flex-shrink: 0;
}
#topbar .mission-title {
  font-family: 'Baloo 2', sans-serif;
  font-weight: 700;
  font-size: 15px;
  line-height: 1.15;
  flex: 1;
  min-width: 0;
}
#topbar .mission-title small {
  display: block; font-family: 'Nunito', sans-serif; font-weight: 600;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--cyan);
  opacity: .9;
}
#score-pill {
  background: rgba(255, 255, 255, 0.1);
  padding: 4px 12px;
  border-radius: 100px;
  font-family: 'Baloo 2', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 6px;
}
#page-counter { font-size: 11px; color: #c7cdfb; font-weight: 700; white-space: nowrap; }

#stage {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 10px;
  scroll-behavior: smooth;
}
#stage::-webkit-scrollbar { width: 8px; }
#stage::-webkit-scrollbar-thumb { background: #c7cde8; border-radius: 8px; }

.page { animation: pageIn .45s ease both; }
@keyframes pageIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 12px;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--indigo); background: #e3e7ff; padding: 5px 12px; border-radius: 100px;
  margin-bottom: 10px;
}
h1.page-title {
  font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 24px;
  margin: 0 0 6px; line-height: 1.2; color: var(--navy);
}
p.lead { font-size: 14.5px; color: var(--ink-soft); margin: 0 0 14px; line-height: 1.5; }
.body-text { font-size: 15px; line-height: 1.6; color: var(--ink); }

.card {
  background: var(--card); border-radius: var(--radius-md); padding: 16px 18px;
  box-shadow: var(--shadow-soft); margin-bottom: 14px;
}
.card.tinted-cyan { background: #e9fbfd; border: 2px solid #b7eff5; }
.card.tinted-amber { background: #fff7e6; border: 2px solid #ffe3a8; }
.card.tinted-mint { background: #eafff6; border: 2px solid #b7f2da; }

.quiz-q { font-weight: 800; font-family: 'Baloo 2', sans-serif; font-size: 16px; color: var(--navy); margin-bottom: 12px; }
.quiz-options { display: grid; gap: 8px; margin-bottom: 12px; }
.quiz-option {
  text-align: left; background: #f4f5fd; border: 2px solid #e2e4f7; border-radius: var(--radius-sm);
  padding: 11px 14px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; color: var(--ink); transition: all .15s ease; display: flex; align-items: center; gap: 10px; width: 100%;
}
.quiz-option:hover { border-color: var(--cyan); background: #fff; }
.quiz-option .letter {
  width: 26px; height: 26px; border-radius: 50%; background: #dfe2f7; color: var(--indigo);
  display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
}
.quiz-option.correct { background: #e2fbf1; border-color: var(--mint); color: #0b6b47; }
.quiz-option.correct .letter { background: var(--mint); color: #fff; }
.quiz-option.wrong { background: #ffeceb; border-color: var(--coral); color: #a12f22; }
.quiz-option.wrong .letter { background: var(--coral); color: #fff; }
.quiz-option[disabled] { cursor: default; }

.feedback-box {
  padding: 12px 16px; border-radius: var(--radius-sm); margin-top: 10px;
  display: none; animation: pop .3s ease both;
}
.feedback-box.show { display: block; }
.feedback-box.correct-style { background: #e2fbf1; border-left: 5px solid var(--mint); color: #0b6b47; }
.feedback-box.wrong-style { background: #ffeceb; border-left: 5px solid var(--coral); color: #a12f22; }
.explanation-text { margin-top: 6px; font-size: 13.5px; color: var(--ink); line-height: 1.5; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 6px; }

.illus-wrap { display: flex; justify-content: center; margin: 10px 0; background: #fff; padding: 12px; border-radius: var(--radius-md); box-shadow: inset 0 2px 6px rgba(0,0,0,0.03); }

#navbar {
  flex-shrink: 0; display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; background: #fff; border-top: 1px solid #e6e8f7;
}
#track {
  flex: 1; display: flex; gap: 3px; align-items: center; overflow-x: auto; padding: 4px 2px;
}
#track::-webkit-scrollbar { display: none; }
.dot {
  width: 8px; height: 8px; border-radius: 50%; background: #d8dbf3; flex-shrink: 0; cursor: pointer; transition: all .2s ease;
}
.dot.done { background: var(--mint); }
.dot.active { background: var(--coral); width: 16px; border-radius: 6px; }

.btn {
  font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 14px;
  border: none; border-radius: 100px; padding: 10px 20px; cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease; box-shadow: 0 4px 0 rgba(0,0,0,0.15);
}
.btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
.btn-primary { background: var(--coral); color: #fff; box-shadow: 0 4px 0 var(--coral-dark); }
.btn-secondary { background: var(--mint); color: #fff; box-shadow: 0 4px 0 var(--mint-dark); }
.btn-ghost { background: #e9ebfb; color: var(--indigo); box-shadow: 0 4px 0 #cfd3f4; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.tag { display: inline-block; font-size: 10.5px; font-weight: 800; padding: 3px 10px; border-radius: 100px; font-family: 'Baloo 2', sans-serif; text-transform: uppercase; margin-bottom: 6px;}
.tag-easy { background: #e2fbf1; color: #0b6b47; }
.tag-mid { background: #fff7e0; color: #8a5b00; }
.tag-hard { background: #ffe6e3; color: #a12f22; }

@media(max-width:600px){
  h1.page-title { font-size: 20px; }
  #stage { padding: 14px 12px 6px; }
  .btn { padding: 8px 14px; font-size: 13px; }
}
</style>
</head>

<script>
/* ============ STARFIELD BACKGROUND ============ */
(function(){
  const c = document.getElementById('stars');
  let html = '';
  for(let i=0; i<60; i++){
    const s = Math.random()*2.2+0.5;
    html += `<div class="star" style="left:${Math.random()*100}%; top:${Math.random()*100}%; width:${s}px; height:${s}px; animation-delay:${Math.random()*3}s;"></div>`;
  }

})();

/* ============ MATH MATH HELPERS ============ */
function polarToCartesian(cx,cy,r,angleDeg){
  const a = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
}
function arcPath(cx,cy,r,startAngle,endAngle){
  if(endAngle - startAngle >= 359.99){ endAngle = startAngle + 359.99; }
  const start = polarToCartesian(cx,cy,r,startAngle);
  const end = polarToCartesian(cx,cy,r,endAngle);
  const largeArc = (endAngle-startAngle) > 180 ? 1 : 0;
  return `M ${cx} ${cy} L ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)} Z`;
}

/* ============ DYNAMIC CHART BUILDERS ============ */
function barChart(data, maxVal, colors) {
  const w = 420, h = 180;
  const padL = 40, padB = 30, padT = 15, padR = 15;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const bw = (plotW / data.length) * 0.55;
  const gap = plotW / data.length;
  colors = colors || ['g-cyan', 'g-coral', 'g-amber', 'g-mint'];

  let bars = '', labels = '', grid = '';
  // Gridlines
  for(let i=0; i<=4; i++){
    const y = padT + plotH - (plotH * i / 4);
    const labelY = Math.round(maxVal * i / 4);
    grid += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e2e4f6" stroke-width="1"/>`;
    grid += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-family="Nunito" font-size="10" fill="#565b8a">${labelY}</text>`;
  }

  data.forEach((d, i) => {
    const x = padL + gap * i + (gap - bw) / 2;
    const bh = (d.value / maxVal) * plotH;
    const y = padT + plotH - bh;
    const col = `url(#${colors[i % colors.length]})`;
    bars += `
      <g>
        <rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${col}" rx="4" />
        <text x="${x + bw/2}" y="${y - 6}" text-anchor="middle" font-family="Baloo 2" font-weight="700" font-size="11" fill="#181c3a">${d.value}</text>
      </g>
    `;
    labels += `<text x="${x + bw/2}" y="${h - 10}" text-anchor="middle" font-family="Nunito" font-weight="700" font-size="11" fill="#181c3a">${d.label}</text>`;
  });

  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${grid}<line x1="${padL}" y1="${padT+plotH}" x2="${w-padR}" y2="${padT+plotH}" stroke="#a9aede" stroke-width="1.5"/>${bars}${labels}</svg>`;
}

function pictogramChart(data, keyUnit, iconId) {
  const w = 420;
  const rowH = 36, iconSize = 22, gap = 6, labelW = 90;
  let rows = '';
  
  data.forEach((d, i) => {
    const full = Math.floor(d.value / keyUnit);
    const rem = (d.value / keyUnit) - full;
    let iconsHtml = '';
    let cx = labelW;

    for (let k = 0; k < full; k++) {
      iconsHtml += `<use href="#${iconId}" x="${cx}" y="${i * rowH + 6}" width="${iconSize}" height="${iconSize}"/>`;
      cx += iconSize + gap;
    }

    if (rem > 0) {
      iconsHtml += `
      <!-- Render half icon using clip path -->
      <g style="opacity:0.25;">
        <use href="#${iconId}" x="${cx}" y="${i * rowH + 6}" width="${iconSize}" height="${iconSize}"/>
      </g>
      <svg x="${cx}" y="${i * rowH + 6}" width="${iconSize * rem}" height="${iconSize}" viewBox="0 0 ${iconSize} ${iconSize}" preserveAspectRatio="xMinYMin slice" overflow="hidden">
        <use href="#${iconId}" x="0" y="0" width="${iconSize}" height="${iconSize}"/>
      </svg>`;
    }

    rows += `
      <text x="0" y="${i * rowH + 21}" font-family="Nunito" font-weight="800" font-size="12" fill="#181c3a">${d.label}</text>
      ${iconsHtml}
    `;
  });

  const h = data.length * rowH + 10;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${rows}</svg>`;
}

function pieChart(segments, useDegrees) {
  const size = 180;
  const cx = size/2, cy = size/2, r = size * 0.38;
  let angle = 0;
  let paths = '', labels = '';
  const outerR = r * 1.25;

  segments.forEach((s) => {
    const sweep = (s.percent / 100) * 360;
    const isMissing = !!s.missing;
    const fill = isMissing ? '#e2e4f6' : `url(#${s.color})`;
    const stroke = isMissing ? '#b9bde0' : '#ffffff';
    const dash = isMissing ? 'stroke-dasharray="3,3"' : '';
    
    paths += `<path d="${arcPath(cx,cy,r,angle,angle+sweep)}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${dash}/>`;
    
    const mid = angle + sweep/2;
    const lp = polarToCartesian(cx, cy, outerR, mid);
    const txt = isMissing ? '?' : (useDegrees ? Math.round(s.percent / 100 * 360) + '°' : s.percent + '%');
    
    labels += `<text x="${lp.x}" y="${lp.y + 4}" text-anchor="middle" font-family="Baloo 2" font-weight="800" font-size="11" fill="${isMissing ? '#8a8fc0' : '#181c3a'}">${txt}</text>`;
    angle += sweep;
  });

  return `<svg viewBox="0 0 ${size} ${size}" width="100%"><ellipse cx="${cx}" cy="${cy+r+4}" rx="${r*0.9}" ry="5" fill="rgba(20,26,77,0.08)"/>${paths}<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ffffff" stroke-width="1"/>${labels}</svg>`;
}

  {
    type: "bar",
    section: "Diagram Batang",
    tag: "tag-mid",

/* ============ ENGINE & STATE MANAGEMENT ============ */
let currentIdx = -1; // -1 means welcome page
let answersState = Array(SOAL_MISI.length).fill(null); // stores user choice index
let score = 0;

const contentEl = document.getElementById('page-content');
const trackEl = document.getElementById('track');
const counterEl = document.getElementById('page-counter');
const sectionLabelEl = document.querySelector('#topbar .mission-title span');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const scoreValEl = document.getElementById('score-val');

function buildTrack(){
  trackEl.innerHTML = '';
  // Welcome dot
  const dotW = document.createElement('div');
  dotW.className = 'dot';
  dotW.dataset.idx = -1;
  dotW.addEventListener('click', () => goTo(-1));
  trackEl.appendChild(dotW);

  SOAL_MISI.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.idx = i;
    dot.addEventListener('click', () => goTo(i));
    trackEl.appendChild(dot);
  });

  // End dot
  const dotE = document.createElement('div');
  dotE.className = 'dot';
  dotE.dataset.idx = SOAL_MISI.length;
  dotE.addEventListener('click', () => goTo(SOAL_MISI.length));
  trackEl.appendChild(dotE);
}

function refreshTrack(){
  const dots = trackEl.querySelectorAll('.dot');
  dots.forEach(d => {
    const idx = parseInt(d.dataset.idx, 10);
    d.classList.toggle('active', idx === currentIdx);
    
    // Done style if answered (for questions)
    if(idx >= 0 && idx < SOAL_MISI.length) {
      d.classList.toggle('done', answersState[idx] !== null);
    }
  });
}

function handleOptionClick(optIdx) {
  if (answersState[currentIdx] !== null) return; // already answered
  
  answersState[currentIdx] = optIdx;
  const s = SOAL_MISI[currentIdx];
  const options = document.querySelectorAll('.quiz-option');
  
  options.forEach((o, idx) => {
    o.disabled = true;
    if (idx === s.correctIdx) {
      o.classList.add('correct');
    }
  });

  const feedbackBox = document.getElementById('feedback');
  feedbackBox.classList.add('show');

  if (optIdx === s.correctIdx) {
    feedbackBox.className = 'feedback-box show correct-style';
    document.getElementById('feedback-title').innerHTML = '🚀 Luar Biasa! Jawabanmu Tepat!';
    score++;
    scoreValEl.textContent = score;
  } else {
    options[optIdx].classList.add('wrong');
    feedbackBox.className = 'feedback-box show wrong-style';
    document.getElementById('feedback-title').innerHTML = '☄️ Kurang Tepat, Jangan Menyerah!';
  }

  refreshTrack();
  saveQuizProgress();
}

function saveQuizProgress() {
  // Option for progress persistency
}

function goTo(idx) {
  if (idx < -1) idx = -1;
  if (idx > SOAL_MISI.length) idx = SOAL_MISI.length;

        </div>

        <button class="btn btn-secondary" onclick="ulangUjian()" style="margin-top:10px;">🔁 Ulangi Ujian</button>
      </div>
    `;
    btnPrev.disabled = false;
    btnNext.textContent = "Selesai ✔";
    btnNext.disabled = true;

  } else {
    // RENDER QUESTION PAGE
    const s = SOAL_MISI[idx];
    sectionLabelEl.textContent = s.section;
    counterEl.textContent = `${idx + 1} / ${SOAL_MISI.length}`;

    let optionsHtml = s.options.map((opt, oIdx) => {
      let extraClass = '';
      let isDisabled = '';
      if (answersState[idx] !== null) {
        isDisabled = 'disabled';
        if (oIdx === s.correctIdx) extraClass = 'correct';
        else if (oIdx === answersState[idx]) extraClass = 'wrong';
      }
      return `
        <button class="quiz-option ${extraClass}" onclick="handleOptionClick(${oIdx})" ${isDisabled}>
          <span class="letter">${['A','B','C','D'][oIdx]}</span>
          <span>${opt}</span>
        </button>
      `;
    }).join('');

    let isShowFeedback = answersState[idx] !== null ? 'show' : '';
    let feedbackThemeClass = '';
    let feedbackTitle = '';
    if (answersState[idx] !== null) {
      if (answersState[idx] === s.correctIdx) {
        feedbackThemeClass = 'correct-style';
        feedbackTitle = '🚀 Luar Biasa! Jawabanmu Tepat!';
      } else {
        feedbackThemeClass = 'wrong-style';
        feedbackTitle = '☄️ Kurang Tepat, Jangan Menyerah!';
      }
    }

    contentEl.innerHTML = `
      <div class="page">
        <span class="tag ${s.tag}">${s.tagText}</span>
        <h1 class="page-title" style="font-size:20px; margin-top:4px;">${s.title}</h1>
        <p class="lead">${s.lead}</p>
        
        ${s.illus()}

        <div class="quiz-q">${s.q}</div>
        <div class="quiz-options">${optionsHtml}</div>

        <div id="feedback" class="feedback-box ${isShowFeedback} ${feedbackThemeClass}">
          <div id="feedback-title" style="font-weight:800; font-family:'Baloo 2'; font-size:14.5px;">${feedbackTitle}</div>
          <div class="explanation-text"><b>Penjelasan Astronomi:</b><br>${s.explain}</div>
        </div>
      </div>
    `;

    btnPrev.disabled = false;
    btnNext.disabled = false;
    btnNext.textContent = (idx === SOAL_MISI.length - 1) ? "Hasil Akhir ▶" : "Lanjut ▶";
    btnNext.className = "btn btn-primary";
  }

  refreshTrack();
  document.getElementById('stage').scrollTop = 0;
  
  // Center active dot in layout scroll
  const activeDot = trackEl.querySelector('.dot.active');
  if (activeDot) activeDot.scrollIntoView({ inline: 'center', block: 'nearest' });
}

function ulangUjian() {
  score = 0;
  scoreValEl.textContent = "0";
  answersState = Array(SOAL_MISI.length).fill(null);
  buildTrack();
  goTo(-1);
}

document.getElementById('btn-prev').addEventListener('click', () => {
  goTo(currentIdx - 1);
});

document.getElementById('btn-next').addEventListener('click', () => {
  goTo(currentIdx + 1);
});

// Run Init
buildTrack();
goTo(-1);
</script>
</body>
</html>
